name: neshra
description: "A new Flutter project."
publish_to: 'none'


version: 1.0.0+1

environment:
  sdk: ^3.10.7


dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_native_splash: ^2.4.7
  google_fonts: ^8.0.1
  flutter_screenutil: ^5.9.3
  easy_localization: ^3.0.8
  provider: ^6.1.5+1
  dio: ^5.9.1
  pretty_dio_logger: ^1.4.0
  flutter_bloc: ^9.1.1
  hive_flutter: ^1.1.0
  fpdart: ^1.2.0
  url_launcher: ^6.3.2
  shimmer: ^3.0.0
  injectable: ^2.7.1+4
  get_it: ^9.2.1
  connectivity_plus: ^7.0.0
  lottie: ^3.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.13
  hive_generator: ^2.0.1
  flutter_launcher_icons: ^0.14.4
  flutter_lints: ^6.0.0
  injectable_generator: ^2.6.2

flutter:

  uses-material-design: true
  assets:
    - assets/images/
    - assets/translations/
    - assets/lottie/



flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo.png"
  min_sdk_android: 21



